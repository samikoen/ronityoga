<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Effect Test</title>
    <style>
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1545389336-cf090694435e?w=1600') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden !important;
        }
        
        .hero::before {
            content: '' !important;
            position: absolute !important;
            top: -5% !important;
            left: -5% !important;
            width: 110% !important;
            height: 110% !important;
            background-image: inherit !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            z-index: -1 !important;
            animation: heroZoomOut 8s ease-out infinite !important;
            transform-origin: center center !important;
        }
        
        @keyframes heroZoomOut {
            0% { transform: scale(1.1) !important; }
            100% { transform: scale(1) !important; }
        }
        
        .hero-content {
            position: relative !important;
            z-index: 2 !important;
        }
        
        .hero-content h1 {
            font-size: 4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 
                0 2px 16px rgba(0,0,0,0.34),
                0 1px 2px rgba(0,0,0,0.3);
        }
        
        .hero-content p {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 
                0 2px 8px rgba(0,0,0,0.32),
                0 1px 1px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1>Zoom Effect Test</h1>
            <p>Background should zoom out continuously</p>
        </div>
    </div>
</body>
</html>
